<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gears-digital</title>
    <link href="./Contacts.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header>
        
            <div class="Jeff">
            <h1>Contact Us</h1>
            <p>We would love to hear from you! Please fill out the form below to get in touch with us.</p>
            </div>

            <!-- hero section -->
             <section>
                
             </section>

            <section>
            <!-- contact form -->
             <form>

                <!-- Full Name input -->
                <label for="full-name">Full Name:</label> <br>
                <input type="text" id="full-name" name="full-name" required> <br><br>

                <!-- Email input -->
                <label for="email">Email:</label> <br>
                <input type="email" id="email" name="email" required> <br><br>

                <!-- Message input -->
                 <label for="message">Message:</label> <br>
                <textarea id="message" name="message" rows="5" required></textarea> <br><br>

                <button type="submit">Submit</button>


             </form>
        </section>
    </header>
    
</body>
</html>
