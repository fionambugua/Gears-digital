<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gears-digital</title>
    <link href="./Contacts.css" rel="stylesheet" type="text/css">
</head>
<body>
        <header>
            <div class="Jeff">
            <h1>Contact Us</h1>
            <p>We would love to hear from you! Please fill out the form below to get in touch with us.</p>
            </div>
            </header>
      
            <section>
            <!-- contact form -->
             <form>

                <!-- Full Name input -->
                <label for="full-name">Full Name:</label> <br>
                <input type="text" id="full-name" name="full-name" required> <br><br>

                <!-- Email input -->
                <label for="email">Email:</label> <br>
                <input type="email" id="email" name="email" required> <br><br>

                <!-- Message input -->
                 <label for="message">Message:</label> <br>
                <textarea id="message" name="message" rows="5" required></textarea> <br><br>

                <button type="submit">Submit</button>
              </form>
        </section>

        <section>   
        <h2>Our Contact Information</h2>
        <p><strong>Address:</strong> 123 Main Street, Anytown, USA</p>
        <p><strong>Phone:</strong> (123) 456-7890</p>
        <p><strong>Email:</strong> info@gears-digital@gmail.com
        </section>
        


    
    
</body>
</html>
